[agent]
  interval = "5s"

[[inputs.cpu]]
  percpu = true
  totalcpu = true

[[inputs.nvidia_smi]]
  fieldpass = [
    "memory_free",
    "memory_used",
    "memory_total",
    "power_draw",
    "utilization_gpu",
    "utilization_memory",
    "temperature_gpu"
  ]

[[inputs.disk]]
  fieldpass = [
    "free",
    "used",
    "total",
    "used_percent"
  ]

[[inputs.mem]]

[[outputs.opentelemetry]]
  service_address = "otel-collector:4317" 

