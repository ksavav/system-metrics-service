services:
  metrics-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metrics-service
    ports:
      - "12345:12345"
    env_file:
      - .env
    restart: unless-stopped
    privileged: true
    networks:
      - metrics-net
    devices:
      - /dev:/dev
    volumes:
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro
      - /proc:/proc:ro

networks:
  metrics-net:
    driver: bridge
