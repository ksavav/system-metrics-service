services:
  telegraf:
    image: telegraf:${TELEGRAF_IMAGE_TAG:-latest}
    container_name: telegraf
    restart: unless-stopped
    environment:
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=${no_proxy},otel-collector,prometheus,system-metrics-service
    volumes:
      - ${TELEGRAF_CONFIG_PATH}:/etc/telegraf/telegraf.conf:ro
      - /var/run/utmp:/var/run/utmp:ro
      - /:/rootfs:ro
    networks:
      - metrics_net
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector:${OTEL_IMAGE_TAG:-latest}
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=${no_proxy},telegraf,prometheus,system-metrics-service
    volumes:
      - ${OTEL_CONFIG_PATH}:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_PORT}:${OTEL_PORT}"
      - "${OTEL_API_PORT}:${OTEL_API_PORT}"
    networks:
      - metrics_net

  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-latest}
    container_name: prometheus
    restart: unless-stopped
    environment:
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=${no_proxy},telegraf,otel-collector,system-metrics-service
    volumes:
      - ${PROMETHEUS_CONFIG_PATH}:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus 
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    networks:
      - metrics_net
    depends_on:
      - otel-collector

  system-metrics-service:
    image: system-metrics-service:${SMS_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: system-metrics-service
    restart: unless-stopped
    environment:
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=${no_proxy},otel-collector,prometheus,telegraf
    env_file:
      - .env
    ports:
      - "${SMS_PORT}:${SMS_PORT}"
    networks:
      - metrics_net
    depends_on:
      - prometheus
      - telegraf

volumes:
  prometheus_data:

networks:
  metrics_net:
    driver: bridge
