services:
  telegraf:
    image: telegraf:latest
    container_name: telegraf
    restart: unless-stopped
    volumes:
      - ${TELEGRAF_CONFIG_PATH}:/etc/telegraf/telegraf.conf:ro
      - /var/run/utmp:/var/run/utmp:ro
      - /:/rootfs:ro
    networks:
      - metrics_net
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ${OTEL_COLLECTOR_CONFIG_PATH}:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_PORT}:${OTEL_COLLECTOR_PORT}"
      - "${OTEL_COLLECTOR_API_PORT}:${OTEL_COLLECTOR_API_PORT}"
    networks:
      - metrics_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ${PROMETHEUS_CONFIG_PATH}:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus 
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    networks:
      - metrics_net
    depends_on:
      - otel-collector

  system-metrics-service:
    image: system-metrics-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: system-metrics-service
    restart: unless-stopped
    ports:
      - "${SYSTEM_METRICS_SERVICE_PORT}:${SYSTEM_METRICS_SERVICE_PORT}"
    env_file:
      - .env
    networks:
      - metrics_net
    depends_on:
      - prometheus

volumes:
  prometheus_data:

networks:
  metrics_net:
    driver: bridge
